name: Recordatorios de labores

# Cuándo corre:
#  - cada día hábil a las 08:00 de Monterrey (UTC-6  ->  14:00 UTC)
#  - o manualmente desde la pestaña Actions (botón "Run workflow")
on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

# Permite que la Action abra/comente issues (de ahí salen las notificaciones)
permissions:
  issues: write
  contents: read

jobs:
  avisar:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DIAS_AVISO: "3"   # cuántos días antes empieza a recordar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Revisar labores y notificar
        run: python .github/scripts/avisar.py
